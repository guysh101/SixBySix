<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DRIFT — Gem World Mockups</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="drift-theme.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="drift-shared.jsx"></script>
<script type="text/babel" src="drift-home-game.jsx"></script>
<script type="text/babel" src="drift-win-profile.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, HomeMock, GameMock, WinMock, ProfileMock } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="screens" title="DRIFT — Gem World" subtitle="Cookie Jam-grade redesign · 390×844 · one polished direction">
          <DCArtboard id="home" label="01 · Home" width={390} height={844}><HomeMock /></DCArtboard>
          <DCArtboard id="game" label="02 · Game" width={390} height={844}><GameMock /></DCArtboard>
          <DCArtboard id="win" label="03 · Win" width={390} height={844}><WinMock /></DCArtboard>
          <DCArtboard id="profile" label="04 · Profile" width={390} height={844}><ProfileMock /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
